global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: 'temporal-exporter'
    static_configs:
      - targets: ['temporal-exporter:9092']
    metrics_path: /metrics
    scrape_interval: 15s

  # litellm metrics not available (no /metrics endpoint)
  # Re-enable if LiteLLM Prometheus export is configured

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 15s

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s

  - job_name: 'worker-metrics'
    static_configs:
      - targets: ['worker-metrics:9093']
    scrape_interval: 15s
