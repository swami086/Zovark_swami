# ============================================================
# Zovark Air-Gap Deployment Compose Override
# Usage: docker compose -f docker-compose.airgap.yml up -d
# ============================================================

services:

  # ─── DATABASE ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: zovark-postgres
    environment:
      POSTGRES_USER: zovark
      POSTGRES_PASSWORD: hydra_dev_2026
      POSTGRES_DB: zovark
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zovark -d zovark"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - zovark-net

  # ─── CACHE / WORKING MEMORY (Valkey — BSD license, Redis API-compatible) ───
  redis:
    image: valkey/valkey:7-alpine
    container_name: zovark-redis
    command: valkey-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - zovark-net

  # ─── WORKFLOW ENGINE ──────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: zovark-temporal
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=zovark
      - POSTGRES_PWD=hydra_dev_2026
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/7233'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - zovark-net

  # ─── LOCAL LLM (Ollama) ──────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: zovark-ollama
    volumes:
      - ./ollama_volume:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped
    networks:
      - zovark-net

  # ─── EMBEDDING SERVER ────────────────────────────────
  embedding-server:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.2
    container_name: zovark-embedding
    environment:
      - MODEL_ID=BAAI/bge-base-en-v1.5
    volumes:
      - ./embedding_volume:/data
    restart: unless-stopped
    networks:
      - zovark-net

  # ─── LLM GATEWAY ─────────────────────────────────────
  litellm:
    image: zovark-litellm:latest
    container_name: zovark-litellm
    command: --config /app/config.yaml --port 4000
    environment:
      - LITELLM_MASTER_KEY=sk-zovark-local
      - DATABASE_URL=postgresql://zovark:hydra_dev_2026@postgres:5432/zovark
      - OPENROUTER_API_KEY=not-needed
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health/liveliness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - zovark-net

  # ─── API ──────────────────────────────────────────────
  api:
    image: zovark-mvp-api:latest
    container_name: zovark-api
    ports:
      - "8090:8090"
    environment:
      - PORT=8090
      - DATABASE_URL=postgresql://zovark:hydra_dev_2026@postgres:5432/zovark
      - TEMPORAL_ADDRESS=temporal:7233
      - LITELLM_MASTER_KEY=sk-zovark-local
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ZOVARK_DEPLOYMENT_MODE=airgap
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    restart: unless-stopped
    networks:
      - zovark-net

  # ─── WORKER ──────────────────────────────────────────
  worker:
    image: zovark-mvp-worker:latest
    # No container_name — allows docker compose --scale worker=N
    environment:
      - DATABASE_URL=postgresql://zovark:hydra_dev_2026@postgres:5432/zovark
      - TEMPORAL_ADDRESS=temporal:7233
      - ZOVARK_LLM_ENDPOINT=http://litellm:4000/v1/chat/completions
      - ZOVARK_LLM_KEY=sk-zovark-local
      - ZOVARK_LLM_MODEL=zovark-local
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      temporal:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zovark-net

  # ─── DASHBOARD ────────────────────────────────────────
  dashboard:
    image: zovark-mvp-dashboard:latest
    container_name: zovark-dashboard
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - zovark-net

networks:
  zovark-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
