openapi: 3.1.0
info:
  title: ZOVARK SOC Automation API
  version: 1.2.0
  description: |
    AI-powered SOC automation platform. Manages security investigations,
    task orchestration, SIEM integration, shadow mode automation, kill switch
    controls, token quota management, MCP approval gates, analytics,
    and multi-tenant operations.

    ## Authentication
    - **Access tokens** expire in 15 minutes and are returned in the JSON response body.
    - **Refresh tokens** are stored in httpOnly cookies (7-day lifetime) and are NOT sent as Bearer tokens.
      Use `POST /api/v1/auth/refresh` to obtain a new access token.
    - **API keys** (zovark_ prefix) can be used for M2M authentication via X-API-Key header.
  contact:
    name: ZOVARK Platform
  license:
    name: Proprietary

servers:
  - url: http://localhost:8090
    description: Local development

security:
  - BearerAuth: []
  - ApiKeyAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT access token obtained from /api/v1/auth/login, /api/v1/auth/callback,
        or /api/v1/auth/refresh. Access tokens expire in 15 minutes. Refresh tokens
        are delivered via httpOnly cookies and cannot be sent as Bearer tokens — use
        the /api/v1/auth/refresh endpoint to rotate access tokens silently.
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for M2M authentication (zovark_ prefix)

  schemas:
    APIResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
        error:
          $ref: '#/components/schemas/APIError'
        meta:
          $ref: '#/components/schemas/APIMeta'

    APIError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

    APIMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        totp_code:
          type: string
          description: TOTP code if 2FA is enabled

    RegisterRequest:
      type: object
      required: [email, password, display_name, tenant_id]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        display_name:
          type: string
        tenant_id:
          type: string
          format: uuid

    TaskRequest:
      type: object
      required: [input]
      properties:
        task_type:
          type: string
          default: log_analysis
        input:
          type: object
          properties:
            prompt:
              type: string
            playbook_id:
              type: string
            severity:
              type: string

    BulkTaskRequest:
      type: object
      required: [tasks]
      properties:
        tasks:
          type: array
          maxItems: 50
          items:
            $ref: '#/components/schemas/TaskRequest'

    Task:
      type: object
      properties:
        task_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, planning, approved, executing, completed, failed, cancelled, awaiting_approval, rejected]
        task_type:
          type: string
        input:
          type: object
        output:
          type: object
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        execution_ms:
          type: integer
        severity:
          type: string

    Tenant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        tier:
          type: string
          enum: [free, professional, enterprise]
        settings:
          type: object
        is_active:
          type: boolean
        max_concurrent:
          type: integer
        created_at:
          type: string
          format: date-time

    Playbook:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        task_type:
          type: string
        is_template:
          type: boolean
        steps:
          type: array
          items:
            type: string

    APIKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        last_used_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    SIEMAlert:
      type: object
      properties:
        id:
          type: string
          format: uuid
        alert_name:
          type: string
        severity:
          type: string
        source_ip:
          type: string
        dest_ip:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

    FeedbackRequest:
      type: object
      properties:
        verdict_correct:
          type: boolean
        corrected_verdict:
          type: string
        false_positive:
          type: boolean
        missed_threat:
          type: boolean
        notes:
          type: string
        analyst_confidence:
          type: number

    HealthResponse:
      type: object
      properties:
        status:
          type: string
        version:
          type: string
        uptime_seconds:
          type: integer
        services:
          type: object

    ShadowRecommendation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        alert_id:
          type: string
          format: uuid
        recommended_action:
          type: string
        severity:
          type: string
        confidence_score:
          type: number
        reasoning:
          type: string
        status:
          type: string
          enum: [pending, decided]
        created_at:
          type: string
          format: date-time
        decided_at:
          type: string
          format: date-time
        decided_by:
          type: string
        human_action:
          type: string
        human_reasoning:
          type: string
        match_category:
          type: string
          enum: [exact_match, partial_match, override, rejection]
        context_data:
          type: object

    ShadowDecideRequest:
      type: object
      required: [action, reasoning, match_category]
      properties:
        action:
          type: string
        severity:
          type: string
        reasoning:
          type: string
        match_category:
          type: string
          enum: [exact_match, partial_match, override, rejection]

    AutomationControl:
      type: object
      properties:
        id:
          type: string
          format: uuid
        scope:
          type: string
          enum: [tenant, workflow, activity, playbook]
        scope_target:
          type: string
        mode:
          type: string
          enum: [shadow, assisted, autonomous, disabled]
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        created_by:
          type: string
        kill_reason:
          type: string

    AutomationControlRequest:
      type: object
      required: [scope, mode]
      properties:
        scope:
          type: string
          enum: [tenant, workflow, activity, playbook]
        scope_target:
          type: string
        mode:
          type: string
          enum: [shadow, assisted, autonomous, disabled]
        enabled:
          type: boolean

    KillRequest:
      type: object
      required: [scope, reason]
      properties:
        scope:
          type: string
          enum: [tenant, workflow]
        scope_target:
          type: string
          description: Required when scope is 'workflow'
        reason:
          type: string

    ResumeRequest:
      type: object
      required: [control_id, reason]
      properties:
        control_id:
          type: string
          format: uuid
        reason:
          type: string
        resume_mode:
          type: string
          enum: [shadow, assisted, autonomous]
          default: shadow
        cooldown_minutes:
          type: integer

    TokenQuota:
      type: object
      properties:
        tenant_id:
          type: string
          format: uuid
        monthly_token_limit:
          type: integer
        monthly_tokens_used:
          type: integer
        monthly_cost_limit_usd:
          type: number
        monthly_cost_used_usd:
          type: number
        warn_threshold_pct:
          type: integer
        token_usage_pct:
          type: number
        cost_usage_pct:
          type: number
        circuit_breaker_open:
          type: boolean
        circuit_breaker_reason:
          type: string
        circuit_breaker_opened_at:
          type: string
          format: date-time
        warning:
          type: boolean
        configured:
          type: boolean

    TokenQuotaUpdateRequest:
      type: object
      properties:
        monthly_token_limit:
          type: integer
        monthly_cost_limit_usd:
          type: number
        warn_threshold_pct:
          type: integer
          minimum: 1
          maximum: 100

    CircuitBreakerRequest:
      type: object
      required: [open, reason]
      properties:
        open:
          type: boolean
          description: true to open (block LLM calls), false to close (resume)
        reason:
          type: string

paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      security: []
      responses:
        '200':
          description: Service health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/auth/login:
    post:
      summary: Authenticate user
      tags: [Authentication]
      security: []
      description: |
        Returns a short-lived access token (15 min) in the response body and sets
        a refresh token (7 days) as an httpOnly cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: Access token (15-minute expiry)
                  user:
                    type: object
          headers:
            Set-Cookie:
              description: httpOnly refresh_token cookie (7-day expiry, SameSite=Strict)
              schema:
                type: string
        '401':
          description: Invalid credentials or TOTP required
        '429':
          description: Account locked or rate limited

  /api/v1/auth/register:
    post:
      summary: Register new user
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created
        '400':
          description: Validation error

  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      tags: [Authentication]
      security: []
      description: |
        Uses the httpOnly refresh_token cookie to issue a new access token.
        No request body is needed — the refresh token is read from the cookie automatically.
        Returns 401 if the cookie is missing or the refresh token is expired/invalid.
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: New access token (15-minute expiry)
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      role:
                        type: string
                      tenant_id:
                        type: string
        '401':
          description: Missing, expired, or invalid refresh token

  /api/v1/auth/logout:
    post:
      summary: Logout and clear refresh token
      tags: [Authentication]
      security: []
      description: |
        Clears the httpOnly refresh_token cookie by setting MaxAge to -1.
        After logout, the client must re-authenticate via /api/v1/auth/login.
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: logged out
          headers:
            Set-Cookie:
              description: Expired refresh_token cookie (clears the token)
              schema:
                type: string

  /api/v1/auth/sso/login:
    get:
      summary: Initiate SSO/OIDC login
      tags: [Authentication]
      security: []
      description: Redirects to the configured IdP authorization endpoint with PKCE
      responses:
        '302':
          description: Redirect to IdP
        '503':
          description: SSO not configured

  /api/v1/auth/callback:
    get:
      summary: OIDC callback handler
      tags: [Authentication]
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSO login successful, returns JWT
        '400':
          description: Invalid state or authorization code

  /api/v1/auth/totp/setup:
    post:
      summary: Setup TOTP 2FA
      tags: [Authentication]
      responses:
        '200':
          description: TOTP secret and QR code URI
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      secret:
                        type: string
                      otpauth_uri:
                        type: string
        '409':
          description: TOTP already enabled

  /api/v1/auth/totp/verify:
    post:
      summary: Verify TOTP code and enable 2FA
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        '200':
          description: TOTP enabled
        '401':
          description: Invalid TOTP code

  /api/v1/tasks:
    get:
      summary: List tasks
      tags: [Tasks]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: severity
          in: query
          schema:
            type: string
        - name: task_type
          in: query
          schema:
            type: string
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: sort
          in: query
          schema:
            type: string
            default: created_at
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Paginated task list
    post:
      summary: Create a task
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskRequest'
      responses:
        '202':
          description: Task created and workflow started
        '200':
          description: Deduplicated — existing investigation returned
        '400':
          description: Validation error

  /api/v1/tasks/bulk:
    post:
      summary: Bulk create tasks (max 50)
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkTaskRequest'
      responses:
        '201':
          description: Tasks created
        '400':
          description: Validation error

  /api/v1/tasks/{id}:
    get:
      summary: Get task details
      tags: [Tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task details
        '404':
          description: Task not found

  /api/v1/tasks/{id}/audit:
    get:
      summary: Get task audit trail
      tags: [Tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Audit trail

  /api/v1/tasks/{id}/steps:
    get:
      summary: Get investigation steps
      tags: [Tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Investigation steps

  /api/v1/tasks/{id}/timeline:
    get:
      summary: Get task timeline
      tags: [Tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Timeline events

  /api/v1/tasks/{id}/stream:
    get:
      summary: Stream task updates via SSE
      tags: [Tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          description: Task not found

  /api/v1/tasks/upload:
    post:
      summary: Upload file and create task
      tags: [Tasks]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                task_type:
                  type: string
                prompt:
                  type: string
      responses:
        '201':
          description: Task created from uploaded file

  /api/v1/stats:
    get:
      summary: Get dashboard statistics
      tags: [Dashboard]
      responses:
        '200':
          description: Aggregated statistics

  /api/v1/playbooks:
    get:
      summary: List playbooks
      tags: [Playbooks]
      responses:
        '200':
          description: List of playbooks
    post:
      summary: Create playbook (admin)
      tags: [Playbooks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, task_type, steps]
              properties:
                name:
                  type: string
                description:
                  type: string
                icon:
                  type: string
                task_type:
                  type: string
                system_prompt_override:
                  type: string
                steps:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Playbook created

  /api/v1/playbooks/{id}:
    put:
      summary: Update playbook (admin)
      tags: [Playbooks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Playbook updated
    delete:
      summary: Delete playbook (admin)
      tags: [Playbooks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Playbook deleted

  /api/v1/skills:
    get:
      summary: List investigation skills
      tags: [Skills]
      responses:
        '200':
          description: List of active skills

  /api/v1/me:
    get:
      summary: Get current user info
      tags: [Users]
      responses:
        '200':
          description: Current user details

  /api/v1/log-sources:
    get:
      summary: List log sources
      tags: [SIEM]
      responses:
        '200':
          description: List of configured log sources
    post:
      summary: Create log source (admin)
      tags: [SIEM]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, source_type]
              properties:
                name:
                  type: string
                source_type:
                  type: string
                connection_config:
                  type: object
      responses:
        '201':
          description: Log source created

  /api/v1/log-sources/{id}:
    put:
      summary: Update log source (admin)
      tags: [SIEM]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Log source updated
    delete:
      summary: Deactivate log source (admin)
      tags: [SIEM]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Log source deactivated

  /api/v1/siem-alerts:
    get:
      summary: List SIEM alerts
      tags: [SIEM]
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: source_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of alerts

  /api/v1/siem-alerts/{id}/investigate:
    post:
      summary: Investigate a SIEM alert
      tags: [SIEM]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Investigation started
        '400':
          description: Alert already investigated

  /api/v1/notifications:
    get:
      summary: Get notifications
      tags: [Dashboard]
      parameters:
        - name: since
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Recent notifications

  /api/v1/investigations/{id}/feedback:
    post:
      summary: Submit investigation feedback
      tags: [Feedback]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
      responses:
        '201':
          description: Feedback recorded

  /api/v1/feedback/stats:
    get:
      summary: Get feedback statistics (admin)
      tags: [Feedback]
      responses:
        '200':
          description: Feedback accuracy statistics

  # ============================================================
  # Analytics Endpoints (Sprint v0.13.0)
  # ============================================================

  /api/v1/analytics/feedback/summary:
    get:
      operationId: getAnalyticsFeedbackSummary
      summary: Get feedback analytics summary
      tags: [Analytics]
      description: |
        Returns an aggregated summary of investigation feedback for the
        authenticated tenant, including accuracy rates, verdict distributions,
        and false-positive/missed-threat counts.
      responses:
        '200':
          description: Feedback analytics summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_feedback:
                    type: integer
                  accuracy_rate:
                    type: number
                  false_positive_count:
                    type: integer
                  missed_threat_count:
                    type: integer
                  avg_confidence:
                    type: number
        '401':
          description: Not authenticated

  /api/v1/analytics/feedback/rules:
    get:
      operationId: getAnalyticsFeedbackRules
      summary: Get per-rule feedback analytics
      tags: [Analytics]
      description: |
        Returns feedback analytics broken down by detection rule, showing
        which rules produce the most false positives, overrides, and
        missed threats. Useful for tuning detection logic.
      responses:
        '200':
          description: Per-rule feedback breakdown
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items:
                      type: object
                      properties:
                        rule_name:
                          type: string
                        total:
                          type: integer
                        accuracy_rate:
                          type: number
                        false_positive_count:
                          type: integer
                        missed_threat_count:
                          type: integer
        '401':
          description: Not authenticated

  /api/v1/analytics/feedback/analysts:
    get:
      operationId: getAnalyticsFeedbackAnalysts
      summary: Get per-analyst feedback analytics
      tags: [Analytics]
      description: |
        Returns feedback analytics broken down by analyst, showing
        individual contribution counts, agreement rates with AI verdicts,
        and average confidence scores.
      responses:
        '200':
          description: Per-analyst feedback breakdown
          content:
            application/json:
              schema:
                type: object
                properties:
                  analysts:
                    type: array
                    items:
                      type: object
                      properties:
                        analyst_id:
                          type: string
                        display_name:
                          type: string
                        total_feedback:
                          type: integer
                        agreement_rate:
                          type: number
                        avg_confidence:
                          type: number
        '401':
