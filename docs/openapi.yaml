  # ============================================================
  # MCP Human-in-the-Loop Approval Gate (Sprint v0.12.0)
  # ============================================================

  /api/v1/mcp/approvals/request:
    post:
      operationId: requestMCPApproval
      summary: Request MCP workflow approval
      tags: [MCP Approvals]
      description: |
        Submits a new approval request for an MCP workflow action. Returns
        an approval token that can be polled via the check endpoint. Any
        authenticated user may create a request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, context]
              properties:
                action:
                  type: string
                  description: The action requiring approval
                context:
                  type: object
                  description: Contextual data for the approver
                ttl_seconds:
                  type: integer
                  description: Time-to-live before auto-expiry
                  default: 3600
      responses:
        '201':
          description: Approval request created
          content:
            application/json:
              schema:
                type: object
                properties:
                  approval_id:
                    type: string
                  token:
                    type: string
                  status:
                    type: string
                    example: pending
                  expires_at:
                    type: string
                    format: date-time
        '401':
          description: Not authenticated

  /api/v1/mcp/approvals/check/{token}:
    get:
      operationId: checkMCPApproval
      summary: Check MCP approval status by token
      tags: [MCP Approvals]
      description: |
        Polls the current status of an MCP approval request using its token.
        Returns the decision if one has been made, or pending/expired status.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Approval status
          content:
            application/json:
              schema:
                type: object
                properties:
                  approval_id:
                    type: string
                  status:
                    type: string
                    enum: [pending, approved, rejected, expired]
                  decided_by:
                    type: string
                  decided_at:
                    type: string
                    format: date-time
                  comment:
                    type: string
        '401':
          description: Not authenticated
        '404':
          description: Approval token not found or expired

  /api/v1/mcp/approvals/pending:
    get:
      operationId: listMCPApprovals
      summary: List pending MCP approvals (admin)
      tags: [MCP Approvals]
      description: |
        Returns all pending MCP approval requests for the tenant. Admin only.
      responses:
        '200':
          description: Pending MCP approvals
          content:
            application/json:
              schema:
                type: object
                properties:
                  approvals:
                    type: array
                    items:
                      type: object
                      properties:
                        approval_id:
                          type: string
                        token:
                          type: string
                        action:
                          type: string
                        context:
                          type: object
                        status:
                          type: string
                        requested_by:
                          type: string
                        requested_at:
                          type: string
                          format: date-time
                        expires_at:
                          type: string
                          format: date-time
                  count:
                    type: integer
        '401':
          description: Not authenticated
        '403':
          description: Admin role required

  /api/v1/mcp/approvals/id/{approval_id}:
    get:
      operationId: getMCPApprovalByID
      summary: Get MCP approval by ID (admin)
      tags: [MCP Approvals]
      description: Returns full details of an MCP approval request by its ID.
      parameters:
        - name: approval_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Approval details
          content:
            application/json:
              schema:
                type: object
                properties:
                  approval_id:
                    type: string
                  token:
                    type: string
                  action:
                    type: string
                  context:
                    type: object
                  status:
                    type: string
                  requested_by:
                    type: string
                  requested_at:
                    type: string
                    format: date-time
                  decided_by:
                    type: string
                  decided_at:
                    type: string
                    format: date-time
                  comment:
                    type: string
        '401':
          description: Not authenticated
        '403':
          description: Admin role required
        '404':
          description: Approval not found

  /api/v1/mcp/approvals/{token}/decide:
    post:
      operationId: decideMCPApproval
      summary: Approve or reject MCP approval (admin)
      tags: [MCP Approvals]
      description: |
        Records an admin decision (approve or reject) on a pending MCP
        approval request identified by its token.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [approved]
              properties:
                approved:
                  type: boolean
                comment:
                  type: string
      responses:
        '200':
          description: Decision recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  approval_id:
                    type: string
                  status:
                    type: string
                    enum: [approved, rejected]
                  decided_by:
                    type: string
                  decided_at:
                    type: string
                    format: date-time
        '401':
          description: Not authenticated
        '403':
          description: Admin role required
        '404':
          description: Approval token not found or already decided

