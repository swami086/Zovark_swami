  # ============================================================
  # Shadow Mode Endpoints (Sprint v0.10.0)
  # ============================================================

  /api/v1/shadow/recommendations:
    get:
      summary: List shadow mode recommendations
      tags: [Shadow Mode]
      description: |
        Lists pending and decided shadow recommendations for the authenticated tenant.
        Shadow mode records what the AI would do without executing, allowing analysts
        to compare their decisions against the AI's recommendations.
      parameters:
        - name: status
          in: query
          description: Filter by status (pending or decided)
          schema:
            type: string
            enum: [pending, decided]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Paginated list of shadow recommendations
          content:
            application/json:
              schema:
                type: object
                properties:
                  recommendations:
                    type: array
                    items:
                      $ref: '#/components/schemas/ShadowRecommendation'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                  pages:
                    type: integer

  /api/v1/shadow/recommendations/{id}:
    get:
      summary: Get shadow recommendation detail
      tags: [Shadow Mode]
      description: Returns full detail for a single shadow recommendation including context data.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Recommendation detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  recommendation:
                    $ref: '#/components/schemas/ShadowRecommendation'
        '404':
          description: Recommendation not found

  /api/v1/shadow/recommendations/{id}/decide:
    post:
      summary: Record human decision on shadow recommendation
      tags: [Shadow Mode]
      description: |
        Analyst records their actual decision against the AI's shadow recommendation.
        The match_category indicates how closely the human action aligned with the AI's
        recommendation (exact_match, partial_match, override, or rejection).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShadowDecideRequest'
      responses:
        '200':
          description: Decision recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: decided
                  recommendation_id:
                    type: string
                  match_category:
                    type: string
                  human_action:
                    type: string
        '400':
          description: Invalid match_category or recommendation already decided
        '404':
          description: Recommendation not found

  /api/v1/shadow/conformance:
    get:
      summary: Get shadow mode conformance statistics
      tags: [Shadow Mode]
      description: |
        Returns conformance analytics showing how well the AI's shadow recommendations
        match human analyst decisions. Includes match rate breakdown by category,
        combined agreement rate, and a 7-day daily trend.
      responses:
        '200':
          description: Conformance statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_decisions:
                    type: integer
                  exact_matches:
                    type: integer
                  partial_matches:
                    type: integer
                  overrides:
                    type: integer
                  rejections:
                    type: integer
                  exact_match_rate:
                    type: number
                  partial_match_rate:
                    type: number
                  override_rate:
                    type: number
                  rejection_rate:
                    type: number
                  combined_match_rate:
                    type: number
                    description: Sum of exact + partial match rates (agreement percentage)
                  pending_count:
                    type: integer
                  daily_trend:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        total:
                          type: integer
                        matches:
                          type: integer
                        match_rate:
                          type: number

  /api/v1/shadow/status:
    get:
      summary: Get shadow mode status
      tags: [Shadow Mode]
      description: |
        Returns the current shadow mode status for the tenant, including the automation
        mode, how long shadow mode has been running, the current match rate, and whether
        the tenant is eligible for promotion to assisted/autonomous mode.
        Promotion requires at least 14 days, 50+ decisions, and a configurable match rate threshold (default 90%).
      responses:
        '200':
          description: Shadow mode status
          content:
            application/json:
              schema:
                type: object
                properties:
                  mode:
                    type: string
                    enum: [shadow, assisted, autonomous, disabled]
                  day_count:
                    type: integer
                  shadow_start_date:
                    type: string
                    format: date-time
                  match_rate:
                    type: number
                  total_decisions:
                    type: integer
                  promotion_threshold:
                    type: number
                  promotion_eligible:
                    type: boolean
                  requirements:
                    type: object
                    properties:
                      min_days:
                        type: integer
                      min_match_rate:
                        type: number
                      min_decisions:
                        type: integer
                      days_met:
                        type: boolean
                      match_rate_met:
                        type: boolean
                      decisions_met:
                        type: boolean

  # ============================================================
  # Automation Control / Kill Switch Endpoints (Sprint v0.10.0)
  # ============================================================

  /api/v1/automation/controls:
    get:
      summary: List automation controls
      tags: [Automation]
      description: Lists all automation controls (mode settings) for the tenant.
      responses:
        '200':
          description: Automation controls
          content:
            application/json:
              schema:
                type: object
                properties:
                  controls:
                    type: array
                    items:
                      $ref: '#/components/schemas/AutomationControl'
                  count:
                    type: integer
    post:
      summary: Create or update automation control
      tags: [Automation]
      description: |
        Upserts an automation control for a given scope (tenant, workflow, activity, playbook).
        If a control already exists for the same scope and scope_target, it is updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutomationControlRequest'
      responses:
        '201':
          description: Control created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    example: created
                  scope:
                    type: string
                  mode:
                    type: string
                  enabled:
                    type: boolean
        '200':
          description: Existing control updated
        '400':
          description: Invalid scope or mode

  /api/v1/automation/kill:
    post:
      summary: Emergency kill switch (admin)
      tags: [Automation]
      description: |
        Immediately disables all automation for the tenant (scope=tenant) or a specific
        workflow (scope=workflow). This is instantaneous — a direct DB update with no queue.
        Dispatches a webhook notification on activation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KillRequest'
      responses:
        '200':
          description: Kill switch activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: killed
                  scope:
                    type: string
                  scope_target:
                    type: string
                  reason:
                    type: string
                  killed_at:
                    type: string
                    format: date-time
        '400':
          description: Invalid scope (must be tenant or workflow)

  /api/v1/automation/resume:
    post:
      summary: Resume automation after kill (admin)
      tags: [Automation]
      description: |
        Re-enables a previously killed automation control. Defaults to shadow mode
        for safety. An optional cooldown_minutes parameter sets a time window before
        full capability is restored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResumeRequest'
      responses:
        '200':
          description: Automation resumed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: resumed
                  control_id:
                    type: string
                  mode:
                    type: string
                  reason:
                    type: string
                  resumed_at:
                    type: string
                    format: date-time
        '400':
          description: Invalid resume_mode
        '404':
          description: Control not found

  /api/v1/automation/audit:
    get:
      summary: Kill switch audit log (admin)
      tags: [Automation]
      description: Returns the kill/resume audit history for the tenant.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  audit_log:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        action:
                          type: string
                          enum: [kill, resume]
                        scope:
                          type: string
                        scope_target:
                          type: string
                        reason:
                          type: string
                        performed_by:
                          type: string
                        performed_at:
                          type: string
                          format: date-time
                  count:
                    type: integer

  # ============================================================
  # Token Quota Endpoints (Sprint v0.10.0)
  # ============================================================

  /api/v1/quotas:
    get:
      summary: Get tenant token quota status
      tags: [Token Quotas]
      description: |
        Returns the current token and cost quota for the authenticated tenant,
        including usage percentages, warning status, and circuit breaker state.
        If no quota is configured, returns defaults with configured=false.
      responses:
        '200':
          description: Token quota status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenQuota'
    put:
      summary: Update tenant token quota limits (admin)
      tags: [Token Quotas]
      description: |
        Sets or updates the monthly token limit, cost limit, and warning threshold
        for the tenant. Uses upsert — creates the quota record if none exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenQuotaUpdateRequest'
      responses:
        '200':
          description: Quota updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: updated
                  monthly_token_limit:
                    type: integer
                  monthly_cost_limit_usd:
                    type: number
                  warn_threshold_pct:
                    type: integer
        '400':
          description: Invalid warn_threshold_pct (must be 1-100)

  /api/v1/quotas/circuit-breaker:
    post:
      summary: Open or close circuit breaker (admin)
      tags: [Token Quotas]
      description: |
        Opens the circuit breaker to block all LLM calls for the tenant, or closes
        it to resume. When open, any LLM-triggering endpoint returns 429 with code
        CIRCUIT_BREAKER_OPEN. Dispatches a webhook notification on state change.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CircuitBreakerRequest'
      responses:
        '200':
          description: Circuit breaker state changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: circuit_breaker_opened
                  circuit_breaker_open:
                    type: boolean
                  reason:
                    type: string
        '400':
          description: Missing reason

  /api/v1/quotas/usage:
    get:
      summary: Get detailed token usage breakdown
      tags: [Token Quotas]
      description: |
        Returns a detailed breakdown of LLM token usage for the current month,
        grouped by model and by day. Includes total tokens, cost, and call counts.
      responses:
        '200':
          description: Token usage breakdown
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: string
                    description: Current month (YYYY-MM)
                  total_tokens:
                    type: integer
                  total_cost:
                    type: number
                  total_calls:
                    type: integer
                  by_model:
                    type: array
                    items:
                      type: object
                      properties:
                        model:
                          type: string
                        tokens_input:
                          type: integer
                        tokens_output:
                          type: integer
                        total_tokens:
                          type: integer
                        cost_usd:
                          type: number
                        call_count:
                          type: integer
                  by_day:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        total_tokens:
                          type: integer
                        cost_usd:
                          type: number
                        call_count:
                          type: integer

  /api/v1/ingest/splunk:
    post:
      summary: Ingest alerts from Splunk
      tags: [SIEM Ingest]
      description: |
        Receives alerts from Splunk via webhook. Accepts Splunk alert action
        payload format and converts to ZOVARK internal alert schema. Each alert
        is deduplicated and queued for investigation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [result]
              properties:
                sid:
                  type: string
                  description: Splunk search ID
                search_name:
                  type: string
                  description: Name of the saved search / correlation rule
                result:
                  type: object
                  description: Splunk result row containing alert fields
                  properties:
                    _raw:
                      type: string
                    _time:
                      type: string
                    source:
                      type: string
                    sourcetype:
                      type: string
                    host:
                      type: string
                app:
                  type: string
                  description: Splunk app context
      responses:
        '202':
          description: Alert accepted for investigation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  task_id:
                    type: string
                    format: uuid
                  message:
                    type: string
        '400':
          description: Invalid payload
        '401':
          description: Missing or invalid API key
        '429':
          description: Rate limit exceeded

  /api/v1/ingest/elastic:
    post:
      summary: Ingest alerts from Elastic Security
      tags: [SIEM Ingest]
      description: |
        Receives alerts from Elastic Security via webhook action. Accepts
        Elastic alert payload format (Kibana alerting or Elastic Security
        detection rules) and converts to ZOVARK internal alert schema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [alert]
              properties:
                alert:
                  type: object
                  description: Elastic Security alert object
                  properties:
                    id:
                      type: string
                    rule:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        severity:
                          type: string
                    signal:
                      type: object
                      properties:
                        original_event:
                          type: object
                        ancestors:
                          type: array
                          items:
                            type: object
                context:
                  type: object
                  description: Additional context from Elastic
                  properties:
                    space_id:
                      type: string
                    tags:
                      type: array
                      items:
                        type: string
      responses:
        '202':
          description: Alert accepted for investigation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  task_id:
                    type: string
                    format: uuid
                  message:
                    type: string
        '400':
          description: Invalid payload
        '401':
          description: Missing or invalid API key
        '429':
          description: Rate limit exceeded

  /api/v1/ingest/health:
    get:
      summary: Check ingest pipeline health
      tags: [SIEM Ingest]
      description: |
        Returns the health status of the ingest pipeline, including queue
        depth, processing rate, and connectivity to downstream services
        (Temporal, Redis, PostgreSQL).
      responses:
        '200':
          description: Ingest pipeline health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded, unhealthy]
                  queue_depth:
                    type: integer
                    description: Number of alerts awaiting processing
                  processing_rate:
                    type: number
                    description: Alerts processed per minute (1-min avg)
                  services:
                    type: object
                    properties:
                      temporal:
                        type: string
                        enum: [connected, disconnected]
                      redis:
                        type: string
                        enum: [connected, disconnected]
                      postgres:
                        type: string
                        enum: [connected, disconnected]
                  last_alert_at:
                    type: string
                    format: date-time
                    description: Timestamp of last ingested alert
        '503':
          description: Ingest pipeline unhealthy

