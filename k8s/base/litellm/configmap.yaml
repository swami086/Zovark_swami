apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: hydra
  labels:
    app: hydra
    component: litellm
data:
  config.yaml: |
    model_list:
      - model_name: fast
        litellm_params:
          model: openrouter/qwen/qwen-2.5-7b-instruct
          api_base: https://openrouter.ai/api/v1
          api_key: os.environ/OPENROUTER_API_KEY
      - model_name: embed
        litellm_params:
          model: huggingface/BAAI/bge-base-en-v1.5
          api_base: http://embedding-server:80
    litellm_settings:
      drop_params: true
      request_timeout: 120
