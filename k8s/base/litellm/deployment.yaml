apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: zovarc
  labels:
    app: zovarc
    component: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zovarc
      component: litellm
  template:
    metadata:
      labels:
        app: zovarc
        component: litellm
    spec:
      containers:
        - name: litellm
          image: docker.litellm.ai/berriai/litellm-database:main-stable
          args:
            - --config
            - /app/config.yaml
            - --port
            - "4000"
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: zovarc-api-secrets
                  key: litellm-master-key
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zovarc-api-secrets
                  key: openrouter-api-key
          volumeMounts:
            - name: litellm-config
              mountPath: /app/config.yaml
              subPath: config.yaml
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: litellm-config
          configMap:
            name: litellm-config
