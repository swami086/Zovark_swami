apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: zovarc
  labels:
    app: zovarc
    component: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zovarc
      component: temporal
  template:
    metadata:
      labels:
        app: zovarc
        component: temporal
    spec:
      containers:
        - name: temporal
          image: temporalio/auto-setup:1.24.2
          ports:
            - containerPort: 7233
              name: grpc
          env:
            - name: DB
              value: "postgres12"
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: "zovarc"
            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: zovarc-db-credentials
                  key: password
            - name: POSTGRES_SEEDS
              value: "postgres"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 30
            periodSeconds: 10
