---
# KEDA ScaledObject — scales worker pods based on Temporal queue depth.
# Requires KEDA operator installed in the cluster.
# If KEDA is not available, use the fallback CPU-based HPA below.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: hydra-worker-keda
  labels:
    app: hydra-worker
spec:
  scaleTargetRef:
    name: hydra-worker
  pollingInterval: 15
  cooldownPeriod: 120
  minReplicaCount: 2
  maxReplicaCount: 50
  advanced:
    restoreToOriginalReplicaCount: false
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 30
          policies:
            - type: Pods
              value: 4
              periodSeconds: 60
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Pods
              value: 2
              periodSeconds: 120
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus:9090
        metricName: hydra_temporal_pending_tasks
        query: hydra_temporal_pending_tasks{task_queue="hydra-tasks"}
        threshold: "5"
---
# Fallback CPU-based HPA — only active if KEDA is not installed.
# KEDA creates its own HPA which supersedes this when present.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hydra-worker-hpa-fallback
  labels:
    app: hydra-worker
  annotations:
    description: "CPU-based fallback. Use KEDA ScaledObject for queue-depth scaling."
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hydra-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
