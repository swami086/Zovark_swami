apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zovark-worker-netpol
  namespace: zovark
  labels:
    app: zovark
    component: worker
spec:
  podSelector:
    matchLabels:
      app: zovark
      component: worker
  policyTypes:
    - Ingress
    - Egress
  # Workers accept NO inbound connections
  ingress: []
  egress:
    # PgBouncer — database via connection pool
    - to:
        - podSelector:
            matchLabels:
              app: zovark
              component: pgbouncer
      ports:
        - protocol: TCP
          port: 5432
    # Temporal — workflow engine
    - to:
        - podSelector:
            matchLabels:
              app: zovark
              component: temporal
      ports:
        - protocol: TCP
          port: 7233
    # Redis — rate limiting + shared state
    - to:
        - podSelector:
            matchLabels:
              app: zovark
              component: redis
      ports:
        - protocol: TCP
          port: 6379
    # LiteLLM — LLM inference gateway
    - to:
        - podSelector:
            matchLabels:
              app: zovark
              component: litellm
      ports:
        - protocol: TCP
          port: 4000
    # kube-dns — service name resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
