apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hydra-worker-hpa
  namespace: hydra
  labels:
    app: hydra
    component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hydra-worker
  minReplicas: 2
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # TODO (Block 6): Custom metric for Temporal queue depth
    # - type: External
    #   external:
    #     metric:
    #       name: temporal_queue_depth
    #       selector:
    #         matchLabels:
    #           queue: hydra-tasks
    #     target:
    #       type: AverageValue
    #       averageValue: "5"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120
