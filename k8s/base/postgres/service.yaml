apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: zovarc
  labels:
    app: zovarc
    component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: zovarc
    component: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-read
  namespace: zovarc
  labels:
    app: zovarc
    component: postgres
    role: read
  annotations:
    description: "Read-only endpoint. Points to primary now; change selector to role=replica when read replica is added."
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: zovarc
    component: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: zovarc
  labels:
    app: zovarc
    component: postgres
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: zovarc
    component: postgres
