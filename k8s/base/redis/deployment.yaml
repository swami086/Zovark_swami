apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: zovark
  labels:
    app: zovark
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zovark
      component: redis
  template:
    metadata:
      labels:
        app: zovark
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
