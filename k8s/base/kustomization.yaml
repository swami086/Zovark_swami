apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: zovark

labels:
  - pairs:
      app: zovark
    includeSelectors: false

resources:
  - namespace.yaml
  # Postgres
  - postgres/statefulset.yaml
  - postgres/service.yaml
  - postgres/configmap.yaml
  # PgBouncer
  - pgbouncer/deployment.yaml
  - pgbouncer/service.yaml
  # Redis
  - redis/deployment.yaml
  - redis/service.yaml
  # Temporal
  - temporal/deployment.yaml
  - temporal/service.yaml
  # LiteLLM removed — direct httpx to llama-server (FIX #23)
  # API
  - api/deployment.yaml
  - api/service.yaml
  - api/hpa.yaml
  # Worker
  - worker/deployment.yaml
  - worker/hpa.yaml
  - worker/networkpolicy.yaml
  # Dashboard
  - dashboard/deployment.yaml
  - dashboard/service.yaml
