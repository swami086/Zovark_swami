apiVersion: apps/v1
kind: Deployment
metadata:
  name: zovarc-dashboard
  namespace: zovarc
  labels:
    app: zovarc
    component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zovarc
      component: dashboard
  template:
    metadata:
      labels:
        app: zovarc
        component: dashboard
    spec:
      containers:
        - name: dashboard
          image: zovarc-mvp-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
