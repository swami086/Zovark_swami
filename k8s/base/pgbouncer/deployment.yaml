apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: zovarc
  labels:
    app: zovarc
    component: pgbouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zovarc
      component: pgbouncer
  template:
    metadata:
      labels:
        app: zovarc
        component: pgbouncer
    spec:
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:latest
          ports:
            - containerPort: 5432
              name: pgbouncer
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: zovarc-db-credentials
                  key: direct-url
            - name: POOL_MODE
              value: "transaction"
            - name: AUTH_TYPE
              value: "plain"
            - name: MAX_CLIENT_CONN
              value: "400"
            - name: DEFAULT_POOL_SIZE
              value: "25"
            - name: MIN_POOL_SIZE
              value: "5"
            - name: RESERVE_POOL_SIZE
              value: "20"
            - name: RESERVE_POOL_TIMEOUT
              value: "3"
            - name: MAX_DB_CONNECTIONS
              value: "50"
            - name: SERVER_IDLE_TIMEOUT
              value: "300"
            - name: QUERY_TIMEOUT
              value: "30"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -h
                - localhost
                - -p
                - "5432"
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -h
                - localhost
                - -p
                - "5432"
            initialDelaySeconds: 5
            periodSeconds: 10
