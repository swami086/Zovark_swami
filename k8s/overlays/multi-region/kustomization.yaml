apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Multi-region patches: adjust replicas, add region labels, configure read replicas
patches:
  # API: 3 replicas per region
  - target:
      kind: Deployment
      name: zovark-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: add
        path: /spec/template/metadata/labels/topology.kubernetes.io~1region
        value: "${ZOVARK_REGION}"

  # Worker: 4 replicas base (HPA scales further)
  - target:
      kind: Deployment
      name: zovark-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 4
      - op: add
        path: /spec/template/metadata/labels/topology.kubernetes.io~1region
        value: "${ZOVARK_REGION}"

  # Worker HPA: min 4, max 50 for multi-region
  - target:
      kind: HorizontalPodAutoscaler
      name: zovark-worker-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 4
      - op: replace
        path: /spec/maxReplicas
        value: 50

  # API HPA: min 3, max 15
  - target:
      kind: HorizontalPodAutoscaler
      name: zovark-api-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 15

  # Postgres: production-grade resources
  - target:
      kind: StatefulSet
      name: postgres
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "2"
            memory: 4Gi
          limits:
            cpu: "4"
            memory: 8Gi

configMapGenerator:
  - name: zovark-region-config
    literals:
      - ZOVARK_REGION=${ZOVARK_REGION:-us-east-1}
      - ZOVARK_ROLE=${ZOVARK_ROLE:-primary}
      - DB_READ_REPLICA_URL=${DB_READ_REPLICA_URL:-}
      - REDIS_REPLICA_URL=${REDIS_REPLICA_URL:-}
