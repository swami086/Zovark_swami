apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: zovark-worker-keda
  namespace: zovark
spec:
  scaleTargetRef:
    name: zovark-worker
  pollingInterval: 15
  cooldownPeriod: 120
  minReplicaCount: 4
  maxReplicaCount: 50
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus:9090
        metricName: zovark_temporal_pending_tasks
        query: zovark_temporal_pending_tasks{task_queue="zovark-tasks"}
        threshold: "5"
