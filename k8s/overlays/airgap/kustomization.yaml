apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - keda-scaledobject.yaml

images:
  - name: pgvector/pgvector
    newName: internal-registry.local:5000/zovark/pgvector
    newTag: pg16
  - name: edoburu/pgbouncer
    newName: internal-registry.local:5000/zovark/pgbouncer
    newTag: latest
  - name: valkey/valkey  # FIX #14: was redis
    newName: internal-registry.local:5000/zovark/valkey
    newTag: 7-alpine
  - name: temporalio/auto-setup
    newName: internal-registry.local:5000/zovark/temporal-auto-setup
    newTag: "1.24.2"
  - name: docker.litellm.ai/berriai/litellm-database
    newName: internal-registry.local:5000/zovark/litellm-database
    newTag: main-stable
  - name: zovark-mvp-worker
    newName: internal-registry.local:5000/zovark/worker
    newTag: latest
  - name: zovark-mvp-api
    newName: internal-registry.local:5000/zovark/api
    newTag: latest
  - name: zovark-mvp-dashboard
    newName: internal-registry.local:5000/zovark/dashboard
    newTag: latest

patches:
  # LiteLLM: switch to local Ollama endpoint
  - target:
      kind: ConfigMap
      name: litellm-config
    patch: |
      - op: replace
        path: /data/config.yaml
        value: |
          model_list:
            - model_name: fast
              litellm_params:
                model: ollama/qwen2.5:1.5b
                api_base: http://ollama:11434
            - model_name: embed
              litellm_params:
                model: ollama/nomic-embed-text
                api_base: http://ollama:11434
          litellm_settings:
            drop_params: true
            request_timeout: 120
