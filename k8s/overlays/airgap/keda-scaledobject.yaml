apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: zovarc-worker-keda
  namespace: zovarc
spec:
  scaleTargetRef:
    name: zovarc-worker
  pollingInterval: 15
  cooldownPeriod: 120
  minReplicaCount: 2
  maxReplicaCount: 50
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus:9090
        metricName: zovarc_temporal_pending_tasks
        query: zovarc_temporal_pending_tasks{task_queue="zovarc-tasks"}
        threshold: "5"
