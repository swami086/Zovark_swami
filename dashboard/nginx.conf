server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Proxy API requests to backend
    # Docker internal DNS resolver + variable forces re-resolution on every request
    # Prevents 502s after API container recreation (stale IP cache)
    resolver 127.0.0.11 valid=5s;
    set $api_backend zovark-api;
    location /api/ {
        proxy_pass http://$api_backend:8090$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Browser OTLP → SigNoz (Ticket 10). Same-origin /otel/* avoids CORS to :4318.
    set $signoz_otel zovark-signoz-collector;
    location /otel/ {
        proxy_pass http://$signoz_otel:4318/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
