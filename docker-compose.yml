# ============================================================
# PROJECT ZOVARK — MVP Docker Compose Stack v1.1.1 (RTX 3050 4GB)
# Model: Meta Llama (3.2 3B + 3.1 8B) (chat) + nomic-embed-text (embed)
# VRAM: 0.40 chat + 0.15 embed = ~2.2GB of 4GB
# 6 errors from v1.0 fixed — see ZOVARK_CORRECTED_WALKTHROUGH.md
# Boot: docker compose up -d
# Verify: docker compose ps (all services healthy)
# ============================================================

services:

  # ─── DATABASE ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: zovark-postgres
    environment:
      POSTGRES_USER: zovark
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zovark_dev_2026}
      POSTGRES_DB: zovark
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./config/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf -c hba_file=/etc/postgresql/pg_hba.conf
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zovark -d zovark"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    restart: unless-stopped
    networks:
      - zovark-internal

  # ─── CACHE / WORKING MEMORY (Valkey — BSD license, Redis API-compatible) ───
  redis:
    image: valkey/valkey:7-alpine
    container_name: zovark-redis
    command: >
      valkey-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-hydra-redis-dev-2026}
      --rename-command FLUSHALL ""
      --rename-command CONFIG ""
      --rename-command DEBUG ""
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${REDIS_PASSWORD:-hydra-redis-dev-2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - zovark-internal

  # ─── SURREALDB (graph + vector — Ticket 2) ───────────
  surrealdb:
    image: surrealdb/surrealdb:v2.1.4
    container_name: zovark-surrealdb
    environment:
      - SURREAL_SYNC_DATA=true
    command: >
      start --log warn
      --user root --pass ${SURREAL_ROOT_PASSWORD:-change-me-surreal}
      rocksdb:/data/zovark.db?sync=every
    volumes:
      - surreal_data:/data
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8008:8000"
    networks:
      - zovark-internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ─── REDPANDA (canonical task dispatch — Ticket 2) ───
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.11
    container_name: zovark-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://127.0.0.1:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://127.0.0.1:18082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --smp
      - "1"
      - --memory
      - 768M
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --default-log-level=warn
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - zovark-internal
    ports:
      - "127.0.0.1:19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ─── FLUENT BIT — customer collection buffer → platform HTTPS (Ticket 5) ───
  fluent-bit:
    image: cr.fluentbit.io/fluent/fluent-bit:3.0.4
    container_name: zovark-fluent-bit
    profiles: ["collection"]
    restart: unless-stopped
    volumes:
      - zovark_collection_buffer:/collection/buffer:ro
      - ./config/fluent-bit.yaml:/fluent-bit/etc/zovark-platform.yaml:ro
    environment:
      ZOVARK_PLATFORM_HOST: ${ZOVARK_PLATFORM_HOST:-api}
      ZOVARK_PLATFORM_PORT: ${ZOVARK_PLATFORM_PORT:-8090}
      ZOVARK_PLATFORM_URI: ${ZOVARK_PLATFORM_URI:-/api/v1/platform/training-data/ingest}
      ZOVARK_PLATFORM_TLS: ${ZOVARK_PLATFORM_TLS:-off}
      # Use same value as API ZOVARK_PLATFORM_INGEST_BEARER for local end-to-end tests
      ZOVARK_PLATFORM_API_KEY: ${ZOVARK_PLATFORM_API_KEY:-${ZOVARK_PLATFORM_INGEST_BEARER:-}}
      ZOVARK_CUSTOMER_ID: ${ZOVARK_CUSTOMER_ID:-00000000-0000-0000-0000-000000000001}
    command:
      - /fluent-bit/bin/fluent-bit
      - -c
      - /fluent-bit/etc/zovark-platform.yaml
    depends_on:
      - api
    networks:
      - zovark-internal

  # ─── CONNECTION POOLER ──────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: zovark-pgbouncer
    environment:
      DATABASE_URL: postgres://zovark:${POSTGRES_PASSWORD:-zovark_dev_2026}@postgres:5432/zovark
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      MAX_CLIENT_CONN: 400
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 20
      RESERVE_POOL_TIMEOUT: 3
      MAX_DB_CONNECTIONS: 50
      SERVER_IDLE_TIMEOUT: 300
      QUERY_TIMEOUT: 30
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - zovark-internal

  # ─── WORKFLOW ENGINE ─────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: zovark-temporal
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=zovark
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-zovark_dev_2026}
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    volumes:
      - ./temporal-config:/etc/temporal/config/dynamicconfig:ro
    expose:
      - "7233"
    depends_on:
      postgres:
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - zovark-internal

  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: zovark-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      temporal:
        condition: service_started
    profiles: ["debug"]
    restart: unless-stopped
    networks:
      - zovark-internal


  # ─── OBJECT STORAGE ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: zovark-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-zovark}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-zovark_dev_2026}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    profiles: ["storage"]
    restart: unless-stopped
    networks:
      - zovark-internal

  # ─── OBSERVABILITY ───────────────────────────────────
  # Tracing: use Signoz (below). Old Jaeger removed — replaced by Signoz stack.

  # ─── TLS TERMINATION / REVERSE PROXY ─────────────────
  caddy:
    image: caddy:2-alpine
    container_name: zovark-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ZOVARK_DOMAIN=${ZOVARK_DOMAIN:-localhost}
      - TLS_EMAIL=${TLS_EMAIL:-admin@zovark.local}
      - ZOVARK_TLS_ENABLED=${ZOVARK_TLS_ENABLED:-false}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - dashboard
    profiles: ["tls"]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - zovark-internal

  # ─── LOCAL LLM ───────────────────────────────────────
  # Inference: llama-server in container zovark-inference (via distroless overlay)
  #   Start with: docker compose -f docker-compose.yml -f docker-compose.distroless.yml up -d
  #   Endpoint: http://zovark-inference:8080/v1/chat/completions
  #   Model: Nemotron-Mini-4B-Instruct Q4_K_M
  #   Customer tier: docker-compose.enterprise.yml (dual containers, bigger CODE model)
  #
  # DEPRECATED: legacy Ollama profile (replaced by zovark-inference)
  ollama:
    image: ollama/ollama:latest
    container_name: zovark-ollama
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 4G
    ports:
      - "11434:11434"
    profiles:
      - airgap-ollama
    restart: unless-stopped
    networks:
      - zovark-internal

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: zovark-api
    ports:
      - "8090:8090"
      # WARNING: If using --network host, port 9091 becomes externally accessible.
      # The OOB watchdog has NO authentication. Use iptables/firewall rules to restrict access.
      - "127.0.0.1:9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-sf", "--max-time", "3", "http://127.0.0.1:8090/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - PORT=8090
      - DATABASE_URL=postgresql://zovark:${POSTGRES_PASSWORD:-zovark_dev_2026}@pgbouncer:5432/zovark
      - TEMPORAL_ADDRESS=temporal:7233
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ZOVARK_LLM_KEY=${ZOVARK_LLM_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-zovark-jwt-secret-dev-2026-CHANGE-ME-IN-PRODUCTION-min-32-chars}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-zovark-redis-dev-2026}@redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-zovark-redis-dev-2026}
      - ZOVARK_REDPANDA_BROKERS=redpanda:9092
      - ZOVARK_PLATFORM_INGEST_BEARER=${ZOVARK_PLATFORM_INGEST_BEARER:-}
      - ZOVARK_ENCRYPTION_KEY=${ZOVARK_ENCRYPTION_KEY:-}
      - ZOVARK_WORKFLOW_VERSION=${ZOVARK_WORKFLOW_VERSION:-InvestigationWorkflowV2}
      # LLM — Ticket 8 defaults: OpenAI Chat Completions
      - ZOVARK_LLM_PROVIDER=${ZOVARK_LLM_PROVIDER:-openai}
      - ZOVARK_LLM_ENDPOINT=${ZOVARK_LLM_ENDPOINT:-https://api.openai.com/v1/chat/completions}
      - ZOVARK_LLM_ENDPOINT_FAST=${ZOVARK_LLM_ENDPOINT_FAST:-https://api.openai.com/v1/chat/completions}
      - ZOVARK_LLM_ENDPOINT_CODE=${ZOVARK_LLM_ENDPOINT_CODE:-https://api.openai.com/v1/chat/completions}
      # OpenTelemetry → SigNoz (Ticket 7). Default in-cluster collector; set OTEL_ENABLED=false to disable.
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://zovark-signoz-collector:4318}
      - ZOVARK_OTEL_ENDPOINT=${ZOVARK_OTEL_ENDPOINT:-http://zovark-signoz-collector:4318}
      - ZOVARK_OTEL_ENABLED=${OTEL_ENABLED:-true}
    depends_on:
      pgbouncer:
        condition: service_healthy
      temporal:
        condition: service_started
      redpanda:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - zovark-internal

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    # No container_name — allows docker compose --scale worker=N
    environment:
      # Workers go through PgBouncer (transaction pooling)
      - DATABASE_URL=postgresql://zovark:${POSTGRES_PASSWORD:-zovark_dev_2026}@pgbouncer:5432/zovark
      - TEMPORAL_ADDRESS=temporal:7233
      - ZOVARK_LLM_PROVIDER=${ZOVARK_LLM_PROVIDER:-openai}
      - ZOVARK_LLM_ENDPOINT=${ZOVARK_LLM_ENDPOINT:-https://api.openai.com/v1/chat/completions}
      - ZOVARK_LLM_ENDPOINT_FAST=${ZOVARK_LLM_ENDPOINT_FAST:-https://api.openai.com/v1/chat/completions}
      - ZOVARK_LLM_ENDPOINT_CODE=${ZOVARK_LLM_ENDPOINT_CODE:-https://api.openai.com/v1/chat/completions}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ZOVARK_LLM_KEY=${ZOVARK_LLM_KEY:-}
      - ZOVARK_MODEL_FAST=${ZOVARK_MODEL_FAST:-gpt-4o-mini}
      - ZOVARK_MODEL_CODE=${ZOVARK_MODEL_CODE:-gpt-4o-mini}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-zovark-redis-dev-2026}@redis:6379/0
      - HOST_SANDBOX_DIR=${PWD}/sandbox
      - DEDUP_ENABLED=${DEDUP_ENABLED:-true}
      - ZOVARK_MODE=${ZOVARK_MODE:-full}
      - ZOVARK_EXECUTION_MODE=${ZOVARK_EXECUTION_MODE:-tools}
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://zovark-signoz-collector:4318}
      - ZOVARK_OTEL_ENDPOINT=${ZOVARK_OTEL_ENDPOINT:-http://zovark-signoz-collector:4318}
      - ZOVARK_OTEL_ENABLED=${OTEL_ENABLED:-true}
      # Root stdlib log level for OTLP → SigNoz (DEBUG = verbose pipeline logs)
      - ZOVARK_LOG_LEVEL=${ZOVARK_LOG_LEVEL:-DEBUG}
      - ZOVARK_MAX_CONCURRENT_ACTIVITIES=${ZOVARK_MAX_CONCURRENT_ACTIVITIES:-16}
      - ZOVARK_MAX_CONCURRENT_WORKFLOWS=${ZOVARK_MAX_CONCURRENT_WORKFLOWS:-32}
      - ZOVARK_FAST_FILL=${ZOVARK_FAST_FILL:-true}
      - ZOVARK_PARALLEL_TOOLS_ENABLED=${ZOVARK_PARALLEL_TOOLS_ENABLED:-false}
      - ZOVARK_MAX_PARALLEL_TOOLS=${ZOVARK_MAX_PARALLEL_TOOLS:-4}
      - PYTHONUNBUFFERED=1
      - ZOVARK_REDPANDA_BROKERS=redpanda:9092
      - ZOVARK_SURREAL_HTTP_URL=http://surrealdb:8000
      - ZOVARK_SURREAL_PASSWORD=${SURREAL_ROOT_PASSWORD:-change-me-surreal}
      - ZOVARK_SURREAL_ENABLED=true
      - ZOVARK_ENTITY_GRAPH_STORE=surreal
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      - HTTP_PROXY=http://squid-proxy:3128
      - HTTPS_PROXY=http://squid-proxy:3128
      - NO_PROXY=postgres,redis,temporal,minio,embedding-server,localhost,zovark-api,pgbouncer,host.docker.internal,api,docker-socket-proxy,zovark-inference,zovark-signoz-collector,zovark-clickhouse,surrealdb,redpanda,api.openai.com
    volumes:
      - ./sandbox:/app/sandbox:ro
      - ./data/bootstrap:/app/bootstrap_data:ro
      - ./dpo:/app/dpo:ro
      - ./scripts/benchmark:/app/benchmark:ro
      - duckdb_analytics:/data/duckdb
    depends_on:
      temporal:
        condition: service_started
      postgres:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
      redpanda:
        condition: service_healthy
      surrealdb:
        condition: service_started
      zovark-signoz-collector:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import temporalio, psycopg2, redis; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - zovark-internal

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        # Browser RUM → nginx /otel/* → collector (Ticket 10). Rebuild dashboard after changing OTEL_ENABLED.
        VITE_OTEL_ENABLED: ${OTEL_ENABLED:-false}
        VITE_OTEL_EXPORTER_OTLP_TRACES_URL: /otel/v1/traces
        VITE_SIGNOZ_UI_BASE: ${VITE_SIGNOZ_UI_BASE:-http://127.0.0.1:3301}
    container_name: zovark-dashboard
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--timeout=3", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - zovark-internal

  # ─── OWASP JUICE SHOP (benchmark target) ────────────────
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: zovark-juice-shop
    ports:
      - "3001:3000"
    profiles: ["benchmark", "siem-lab"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - zovark-internal

  temporal-exporter:
    build:
      context: ./worker
    container_name: zovark-temporal-exporter
    command: python /app/monitoring/temporal_exporter.py
    environment:
      - DATABASE_URL=postgresql://zovark:${POSTGRES_PASSWORD:-zovark_dev_2026}@postgres:5432/zovark
      - TEMPORAL_ADDRESS=temporal:7233
      - EXPORTER_PORT=9092
    volumes:
      - ./monitoring:/app/monitoring:ro
    ports:
      - "9092:9092"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["monitoring"]
    restart: unless-stopped
    networks:
      - zovark-internal

  # ─── MONITORING STACK (Sprint 1F) ─────────────────────
  # Prometheus + Grafana + exporters — all under "monitoring" profile
  # Start with: docker compose --profile monitoring up -d
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: zovark-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - temporal-exporter
    profiles: ["monitoring"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - zovark-internal

  grafana:
    image: grafana/grafana:11.0.0
    container_name: zovark-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=zovark
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/zovark-overview.json
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/provisioning/dashboards/zovark-overview.json:/var/lib/grafana/dashboards/zovark-overview.json:ro
      - ./monitoring/grafana/dashboards/infrastructure.json:/var/lib/grafana/dashboards/infrastructure.json:ro
      - ./monitoring/grafana/dashboards/worker-performance.json:/var/lib/grafana/dashboards/worker-performance.json:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    profiles: ["monitoring"]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - zovark-internal

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: zovark-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://zovark:${POSTGRES_PASSWORD:-zovark_dev_2026}@postgres:5432/zovark?sslmode=prefer"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["monitoring"]
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    restart: unless-stopped
    networks:
      - zovark-internal

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: zovark-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-zovark-redis-dev-2026}
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["monitoring"]
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    restart: unless-stopped
    networks:
      - zovark-internal

  worker-metrics:
    build:
      context: ./worker
    container_name: zovark-worker-metrics
    command: python /app/monitoring/worker_metrics.py
    environment:
      - DATABASE_URL=postgresql://zovark:${POSTGRES_PASSWORD:-zovark_dev_2026}@postgres:5432/zovark
      - REDIS_URL=redis://:${REDIS_PASSWORD:-zovark-redis-dev-2026}@redis:6379/0
      - METRICS_PORT=9093
    volumes:
      - ./monitoring:/app/monitoring:ro
    ports:
      - "9093:9093"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["monitoring"]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - zovark-internal

  # ─── DOCKER SOCKET PROXY (Mission 1: Socket Security) ──
  # Allowlists only container lifecycle ops the worker needs.
  # Blocks images, exec, networks, volumes, swarm, secrets, etc.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: zovark-docker-proxy
    restart: unless-stopped
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      POST: 1
      IMAGES: 0
      NETWORKS: 0
      VOLUMES: 0
      EXEC: 0
      SWARM: 0
      NODES: 0
      SERVICES: 0
      TASKS: 0
      SECRETS: 0
      CONFIGS: 0
      PLUGINS: 0
      INFO: 0
      EVENTS: 0
      AUTH: 0
      BUILD: 0
      COMMIT: 0
      DISTRIBUTION: 0
      SYSTEM: 0
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    networks:
      - zovark-internal

  # ─── EGRESS PROXY ──────────────────────────────────────
  squid-proxy:
    image: ubuntu/squid:latest
    container_name: zovark-egress-proxy
    volumes:
      - ./proxy/squid.conf:/etc/squid/squid.conf:ro
    expose:
      - "3128"
    networks:
      - zovark-internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'

  zovark-vllm-chat:
    image: vllm/vllm-openai:latest
    container_name: zovark-vllm-chat
    command: --model /models/chat-model --port 8000 --max-model-len 4096
    volumes:
      - ./local_models/chat-model:/models/chat-model
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - zovark-internal
    profiles: ["vllm"]

  zovark-vllm-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.2
    container_name: zovark-vllm-embed
    command: --model-id /models/embed-model --port 8001
    volumes:
      - ./local_models/embed-model:/models/embed-model
    networks:
      - zovark-internal
    profiles: ["vllm"]

  # ─── FLEET AGENT (self-healer) ──────────────────────────
  healer:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: zovark-healer
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - healer-logs:/var/log/zovark
    environment:
      - HEALER_CHECK_INTERVAL=30
      # Aligned with worker/settings.py ZOVARK_ prefix
      - ZOVARK_DB_USER=${POSTGRES_USER:-zovark}
      - ZOVARK_DB_PASSWORD=${POSTGRES_PASSWORD:-hydra_dev_2026}
      - ZOVARK_DB_NAME=${POSTGRES_DB:-zovark}
      - ZOVARK_REDIS_PASSWORD=${REDIS_PASSWORD:-hydra-redis-dev-2026}
      - ZOVARK_LLM_PROVIDER=${ZOVARK_LLM_PROVIDER:-openai}
      - ZOVARK_LLM_FAST_MODEL=${ZOVARK_MODEL_FAST:-gpt-4o-mini}
      - ZOVARK_LLM_BASE_URL=${ZOVARK_LLM_BASE_URL:-https://api.openai.com}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ZOVARK_LLM_KEY=${ZOVARK_LLM_KEY:-}
      - ZOVARK_OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://zovark-signoz-collector:4318}
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - zovark-internal

  # ─── SIEM LAB (opt-in profile) ──────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    profiles: ["siem-lab"]
    container_name: zovark-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: curl -s http://localhost:9200/_cluster/health | grep -q '"status"'
      interval: 10s
      retries: 20
      start_period: 30s
    networks:
      - zovark-internal

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    profiles: ["siem-lab"]
    container_name: zovark-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - zovark-internal

  nginx-proxy:
    image: nginx:alpine
    profiles: ["siem-lab"]
    container_name: zovark-nginx-proxy
    ports:
      - "8080:80"
    volumes:
      - ./siem-lab/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./siem-lab/logs:/var/log/nginx
    depends_on:
      - juice-shop
    networks:
      - zovark-internal

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    profiles: ["siem-lab"]
    container_name: zovark-filebeat
    user: root
    command: filebeat -e --strict.perms=false
    volumes:
      - ./siem-lab/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./siem-lab/logs:/var/log/nginx:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - zovark-internal

# ─── TRACING — SigNoz v0.76 unified binary (Query Builder v5 → /api/v5/query_range for MCP) ──
# UI + API: http://localhost:3301  |  OTLP: zovark-signoz-collector:4318
# First boot: schema migrators must complete before zovark-signoz. If upgrading from query-service ≤0.64,
# remove volume signoz-query-data or expect SQLite/auth reset; ClickHouse may need re-migration.
# Schema: signoz/signoz-schema-migrator:v0.111.34 — see zovark-signoz-schema-sync below.

  zovark-clickhouse:
    image: clickhouse/clickhouse-server:24.1.2-alpine
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./config/signoz/clickhouse-cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
    networks:
      - zovark-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clickhouse-client", "-q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 45s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  zovark-signoz-schema-sync:
    image: signoz/signoz-schema-migrator:v0.111.34
    command: ["sync", "--dsn=tcp://zovark-clickhouse:9000", "--up="]
    depends_on:
      zovark-clickhouse:
        condition: service_healthy
    networks:
      - zovark-internal
    restart: on-failure

  zovark-signoz-schema-async:
    image: signoz/signoz-schema-migrator:v0.111.34
    command: ["async", "--dsn=tcp://zovark-clickhouse:9000", "--up="]
    depends_on:
      zovark-clickhouse:
        condition: service_healthy
      zovark-signoz-schema-sync:
        condition: service_completed_successfully
    networks:
      - zovark-internal
    restart: on-failure

  zovark-signoz:
    image: signoz/signoz:v0.76.2
    container_name: zovark-signoz
    command:
      - --config=/root/config/prometheus.yml
      - --use-logs-new-schema=true
      - --use-trace-new-schema=true
    depends_on:
      zovark-clickhouse:
        condition: service_healthy
      zovark-signoz-schema-sync:
        condition: service_completed_successfully
    ports:
      - "3301:8080"
    volumes:
      - ./config/signoz/prometheus.yml:/root/config/prometheus.yml:ro
      - ./config/signoz/dashboards:/root/config/dashboards:ro
      - signoz-query-data:/var/lib/signoz
    environment:
      - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://zovark-clickhouse:9000
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
      - DASHBOARDS_PATH=/root/config/dashboards
      - STORAGE=clickhouse
      - GODEBUG=netdns=go
      - TELEMETRY_ENABLED=true
      - DEPLOYMENT_TYPE=docker-standalone-amd
    networks:
      - zovark-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--timeout=3", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  zovark-signoz-collector:
    image: signoz/signoz-otel-collector:v0.111.34
    container_name: zovark-signoz-collector
    command:
      - --config=/etc/otel-collector-config.yaml
      - --manager-config=/etc/manager-config.yaml
      - --copy-path=/var/tmp/collector-config.yaml
      - --feature-gates=-pkg.translator.prometheus.NormalizeName
    depends_on:
      zovark-clickhouse:
        condition: service_healthy
      zovark-signoz-schema-sync:
        condition: service_completed_successfully
      zovark-signoz:
        condition: service_healthy
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=zovark-signoz-collector,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    volumes:
      - ./config/signoz/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
      - ./config/signoz/otel-collector-opamp-config.yaml:/etc/manager-config.yaml:ro
    # Image has no curl/wget; perl is present — probe OTLP HTTP port is listening.
    healthcheck:
      test:
        - CMD-SHELL
        - perl -MIO::Socket::INET -e 'my $$s=IO::Socket::INET->new(PeerHost=>"127.0.0.1",PeerPort=>4318,Proto=>"tcp",Timeout=>3) or exit 1; close $$s'
      interval: 15s
      timeout: 8s
      retries: 10
      start_period: 60s
    networks:
      - zovark-internal
    restart: unless-stopped

# ─── NETWORKS ──────────────────────────────────────────
networks:
  zovark-internal:
    driver: bridge

# ─── VOLUMES ───────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  surreal_data:
  redpanda_data:
  duckdb_analytics:
  minio_data:
  ollama_data:
  prometheus_data:
  grafana_data:
  caddy_data:
  caddy_config:
  es-data:
  healer-logs:
  clickhouse-data:
  signoz-query-data:
  zovark_collection_buffer:
  # nginx-logs: replaced with bind mount ./siem-lab/logs
