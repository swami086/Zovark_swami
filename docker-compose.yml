# ============================================================
# PROJECT ZOVARK — MVP Docker Compose Stack v1.1.1 (RTX 3050 4GB)
# Model: Meta Llama (3.2 3B + 3.1 8B) (chat) + nomic-embed-text (embed)
# VRAM: 0.40 chat + 0.15 embed = ~2.2GB of 4GB
# 6 errors from v1.0 fixed — see ZOVARK_CORRECTED_WALKTHROUGH.md
# Boot: docker compose up -d
# Verify: docker compose ps (all services healthy)
# ============================================================

services:

  # ─── DATABASE ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: zovark-postgres
    environment:
      POSTGRES_USER: zovark
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zovark_dev_2026}
      POSTGRES_DB: zovark
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./config/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf -c hba_file=/etc/postgresql/pg_hba.conf
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zovark -d zovark"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    restart: unless-stopped
    networks:
      - zovark-internal

  # ─── CACHE / WORKING MEMORY ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: zovark-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-zovark-redis-dev-2026}
      --rename-command FLUSHALL ""
      --rename-command CONFIG ""
      --rename-command DEBUG ""
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-zovark-redis-dev-2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - zovark-internal

  # ─── CONNECTION POOLER ──────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: zovark-pgbouncer
    environment:
      DATABASE_URL: postgres://zovark:${POSTGRES_PASSWORD:-zovark_dev_2026}@postgres:5432/zovark
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      MAX_CLIENT_CONN: 400
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 20
      RESERVE_POOL_TIMEOUT: 3
      MAX_DB_CONNECTIONS: 50
      SERVER_IDLE_TIMEOUT: 300
      QUERY_TIMEOUT: 30
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - zovark-internal

  # ─── WORKFLOW ENGINE ─────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: zovark-temporal
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=zovark
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-zovark_dev_2026}
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    volumes:
      - ./temporal-config:/etc/temporal/config/dynamicconfig:ro
    expose:
      - "7233"
    depends_on:
      postgres:
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - zovark-internal

  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: zovark-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      temporal:
        condition: service_started
    profiles: ["debug"]
    restart: unless-stopped
    networks:
      - zovark-internal


  # ─── OBJECT STORAGE ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: zovark-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-zovark}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-zovark_dev_2026}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    profiles: ["storage"]
    restart: unless-stopped
    networks:
      - zovark-internal

  # ─── OBSERVABILITY ───────────────────────────────────
  # Start with: docker compose --profile monitoring up -d
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: zovark-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    profiles: ["monitoring"]
    restart: unless-stopped
    networks:
      - zovark-internal

  # ─── TLS TERMINATION / REVERSE PROXY ─────────────────
  caddy:
    image: caddy:2-alpine
    container_name: zovark-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ZOVARK_DOMAIN=${ZOVARK_DOMAIN:-localhost}
      - TLS_EMAIL=${TLS_EMAIL:-admin@zovark.local}
      - ZOVARK_TLS_ENABLED=${ZOVARK_TLS_ENABLED:-false}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - dashboard
    profiles: ["tls"]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - zovark-internal

  # ─── LOCAL LLM ───────────────────────────────────────
  # Primary: Ollama running on host (not in Docker)
  #   Start with: ollama serve
  #   Endpoint: http://host.docker.internal:11434/v1/chat/completions
  #   Models: Meta Llama 3.1 8B (code/assess) + Meta Llama 3.2 3B (fast/param fill)
  #   GPU: RTX 3050 4GB — only 1 model loaded at a time, Ollama swaps on demand
  #
  # Fallback (air-gap without host GPU): Ollama in Docker
  ollama:
    image: ollama/ollama:latest
    container_name: zovark-ollama
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 4G
    ports:
      - "11434:11434"
    profiles:
      - airgap-ollama
    restart: unless-stopped
    networks:
      - zovark-internal

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: zovark-api
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--timeout=3", "http://127.0.0.1:8090/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - PORT=8090
      - DATABASE_URL=postgresql://zovark:${POSTGRES_PASSWORD:-zovark_dev_2026}@pgbouncer:5432/zovark
      - TEMPORAL_ADDRESS=temporal:7233
      - ZOVARK_LLM_KEY=${ZOVARK_LLM_KEY:-sk-zovark-dev-2026}
      - JWT_SECRET=${JWT_SECRET:-zovark-jwt-secret-dev-2026-CHANGE-ME-IN-PRODUCTION-min-32-chars}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-zovark-redis-dev-2026}@redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-zovark-redis-dev-2026}
      - NATS_URL=nats://${NATS_USER:-zovark}:${NATS_PASSWORD:-zovark-nats-dev-2026}@zovark-nats:4222
      - ZOVARK_ENCRYPTION_KEY=${ZOVARK_ENCRYPTION_KEY:-}
      - ZOVARK_WORKFLOW_VERSION=${ZOVARK_WORKFLOW_VERSION:-InvestigationWorkflowV2}
    depends_on:
      pgbouncer:
        condition: service_healthy
      temporal:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - zovark-internal

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    # No container_name — allows docker compose --scale worker=N
    environment:
      # Workers go through PgBouncer (transaction pooling)
      - DATABASE_URL=postgresql://zovark:${POSTGRES_PASSWORD:-zovark_dev_2026}@pgbouncer:5432/zovark
      - TEMPORAL_ADDRESS=temporal:7233
      - ZOVARK_LLM_ENDPOINT=${ZOVARK_LLM_ENDPOINT:-http://host.docker.internal:11434/v1/chat/completions}
      - ZOVARK_LLM_ENDPOINT_FAST=${ZOVARK_LLM_ENDPOINT_FAST:-http://host.docker.internal:11434/v1/chat/completions}
      - ZOVARK_LLM_ENDPOINT_CODE=${ZOVARK_LLM_ENDPOINT_CODE:-http://host.docker.internal:11434/v1/chat/completions}
      - ZOVARK_LLM_KEY=${ZOVARK_LLM_KEY:-sk-zovark-dev-2026}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-zovark-redis-dev-2026}@redis:6379/0
      - HOST_SANDBOX_DIR=${PWD}/sandbox
      - ZOVARK_MODEL_FAST=${ZOVARK_MODEL_FAST:-llama3.2:3b}
      - ZOVARK_MODEL_CODE=${ZOVARK_MODEL_CODE:-llama3.1:8b}
      - DEDUP_ENABLED=${DEDUP_ENABLED:-true}
      - ZOVARK_MODE=${ZOVARK_MODE:-full}
      - ZOVARK_EXECUTION_MODE=${ZOVARK_EXECUTION_MODE:-tools}
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://zovark-signoz-collector:4318}
      - ZOVARK_MAX_CONCURRENT_ACTIVITIES=${ZOVARK_MAX_CONCURRENT_ACTIVITIES:-8}
      - ZOVARK_MAX_CONCURRENT_WORKFLOWS=${ZOVARK_MAX_CONCURRENT_WORKFLOWS:-16}
      - PYTHONUNBUFFERED=1
      - NATS_URL=nats://${NATS_USER:-zovark}:${NATS_PASSWORD:-zovark-nats-dev-2026}@zovark-nats:4222
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      - HTTP_PROXY=http://squid-proxy:3128
      - HTTPS_PROXY=http://squid-proxy:3128
      - NO_PROXY=postgres,redis,temporal,minio,nats,jaeger,embedding-server,localhost,zovark-api,pgbouncer,host.docker.internal,api,docker-socket-proxy,zovark-signoz-collector,zovark-clickhouse
    volumes:
      - ./sandbox:/app/sandbox:ro
      - ./data/bootstrap:/app/bootstrap_data:ro
      - ./dpo:/app/dpo:ro
      - ./scripts/benchmark:/app/benchmark:ro
    depends_on:
      temporal:
        condition: service_started
      postgres:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import temporalio, psycopg2, redis; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - zovark-internal

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: zovark-dashboard
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--timeout=3", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - zovark-internal

  # ─── OWASP JUICE SHOP (benchmark target) ────────────────
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: zovark-juice-shop
    ports:
      - "3001:3000"
    profiles: ["benchmark", "siem-lab"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - zovark-internal

  temporal-exporter:
    build:
      context: ./worker
    container_name: zovark-temporal-exporter
    command: python /app/monitoring/temporal_exporter.py
    environment:
      - DATABASE_URL=postgresql://zovark:${POSTGRES_PASSWORD:-zovark_dev_2026}@postgres:5432/zovark
      - TEMPORAL_ADDRESS=temporal:7233
      - EXPORTER_PORT=9092
    volumes:
      - ./monitoring:/app/monitoring:ro
    ports:
      - "9092:9092"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["monitoring"]
    restart: unless-stopped
    networks:
      - zovark-internal

  # ─── MONITORING STACK (Sprint 1F) ─────────────────────
  # Prometheus + Grafana + exporters — all under "monitoring" profile
  # Start with: docker compose --profile monitoring up -d
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: zovark-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - temporal-exporter
    profiles: ["monitoring"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - zovark-internal

  grafana:
    image: grafana/grafana:11.0.0
    container_name: zovark-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=zovark
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/zovark-overview.json
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/provisioning/dashboards/zovark-overview.json:/var/lib/grafana/dashboards/zovark-overview.json:ro
      - ./monitoring/grafana/dashboards/infrastructure.json:/var/lib/grafana/dashboards/infrastructure.json:ro
      - ./monitoring/grafana/dashboards/worker-performance.json:/var/lib/grafana/dashboards/worker-performance.json:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    profiles: ["monitoring"]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - zovark-internal

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: zovark-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://zovark:${POSTGRES_PASSWORD:-zovark_dev_2026}@postgres:5432/zovark?sslmode=prefer"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["monitoring"]
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    restart: unless-stopped
    networks:
      - zovark-internal

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: zovark-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-zovark-redis-dev-2026}
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["monitoring"]
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    restart: unless-stopped
    networks:
      - zovark-internal

  worker-metrics:
    build:
      context: ./worker
    container_name: zovark-worker-metrics
    command: python /app/monitoring/worker_metrics.py
    environment:
      - DATABASE_URL=postgresql://zovark:${POSTGRES_PASSWORD:-zovark_dev_2026}@postgres:5432/zovark
      - REDIS_URL=redis://:${REDIS_PASSWORD:-zovark-redis-dev-2026}@redis:6379/0
      - METRICS_PORT=9093
    volumes:
      - ./monitoring:/app/monitoring:ro
    ports:
      - "9093:9093"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["monitoring"]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - zovark-internal

  # ─── DOCKER SOCKET PROXY (Mission 1: Socket Security) ──
  # Allowlists only container lifecycle ops the worker needs.
  # Blocks images, exec, networks, volumes, swarm, secrets, etc.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: zovark-docker-proxy
    restart: unless-stopped
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      POST: 1
      IMAGES: 0
      NETWORKS: 0
      VOLUMES: 0
      EXEC: 0
      SWARM: 0
      NODES: 0
      SERVICES: 0
      TASKS: 0
      SECRETS: 0
      CONFIGS: 0
      PLUGINS: 0
      INFO: 0
      EVENTS: 0
      AUTH: 0
      BUILD: 0
      COMMIT: 0
      DISTRIBUTION: 0
      SYSTEM: 0
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    networks:
      - zovark-internal

  # ─── EGRESS PROXY ──────────────────────────────────────
  squid-proxy:
    image: ubuntu/squid:latest
    container_name: zovark-egress-proxy
    volumes:
      - ./proxy/squid.conf:/etc/squid/squid.conf:ro
    expose:
      - "3128"
    networks:
      - zovark-internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'

  zovark-vllm-chat:
    image: vllm/vllm-openai:latest
    container_name: zovark-vllm-chat
    command: --model /models/chat-model --port 8000 --max-model-len 4096
    volumes:
      - ./local_models/chat-model:/models/chat-model
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - zovark-internal
    profiles: ["vllm"]

  zovark-vllm-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.2
    container_name: zovark-vllm-embed
    command: --model-id /models/embed-model --port 8001
    volumes:
      - ./local_models/embed-model:/models/embed-model
    networks:
      - zovark-internal
    profiles: ["vllm"]

  # ─── FLEET AGENT (self-healer) ──────────────────────────
  healer:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: zovark-healer
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - healer-logs:/var/log/zovark
    environment:
      - HEALER_CHECK_INTERVAL=30
      - REDIS_PASSWORD=${REDIS_PASSWORD:-hydra-redis-dev-2026}
      - POSTGRES_USER=${POSTGRES_USER:-zovark}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-hydra_dev_2026}
      - POSTGRES_DB=${POSTGRES_DB:-zovark}
      - ZOVARK_MODEL_FAST=${ZOVARK_MODEL_FAST:-llama3.2:3b}
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - zovark-internal

  # ─── SIEM LAB (opt-in profile) ──────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    profiles: ["siem-lab"]
    container_name: zovark-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: curl -s http://localhost:9200/_cluster/health | grep -q '"status"'
      interval: 10s
      retries: 20
      start_period: 30s
    networks:
      - zovark-internal

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    profiles: ["siem-lab"]
    container_name: zovark-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - zovark-internal

  nginx-proxy:
    image: nginx:alpine
    profiles: ["siem-lab"]
    container_name: zovark-nginx-proxy
    ports:
      - "8080:80"
    volumes:
      - ./siem-lab/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./siem-lab/logs:/var/log/nginx
    depends_on:
      - juice-shop
    networks:
      - zovark-internal

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    profiles: ["siem-lab"]
    container_name: zovark-filebeat
    user: root
    command: filebeat -e --strict.perms=false
    volumes:
      - ./siem-lab/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./siem-lab/logs:/var/log/nginx:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - zovark-internal

# ─── TRACING — Signoz (opt-in: docker compose --profile tracing up -d) ──
# Signoz UI at http://localhost:3301 — service maps, trace search, latency dashboards
# Self-hosted, ClickHouse-backed, air-gap safe (zero cloud telemetry)

  zovark-clickhouse:
    image: clickhouse/clickhouse-server:24.1-alpine
    profiles: ["tracing"]
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./config/signoz/clickhouse-cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
    networks:
      - zovark-internal
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # Schema migration (run once): docker run --rm --network hydra-mvp_zovark-internal signoz/signoz-schema-migrator:0.111.16 --dsn "tcp://zovark-clickhouse:9000" sync

  zovark-signoz-collector:
    image: signoz/signoz-otel-collector:0.111.16
    profiles: ["tracing"]
    command: ["--config=/etc/otel/config.yaml", "--copy-path=/var/tmp/collector-config.yaml"]
    depends_on:
      - zovark-clickhouse
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP (worker sends traces here)
    volumes:
      - ./config/signoz/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    networks:
      - zovark-internal
    restart: unless-stopped

  zovark-signoz-query:
    image: signoz/query-service:0.64.0
    profiles: ["tracing"]
    depends_on:
      - zovark-clickhouse
      - zovark-signoz-collector
    environment:
      - ClickHouseUrl=tcp://zovark-clickhouse:9000
      - STORAGE=clickhouse
      - GODEBUG=netdns=go
      - SIGNOZ_LOCAL_DB_PATH=/var/lib/signoz/signoz.db
    volumes:
      - signoz-query-data:/var/lib/signoz
    networks:
      zovark-internal:
        aliases:
          - signoz-query-service
    restart: unless-stopped

  zovark-signoz-frontend:
    image: signoz/frontend:0.64.0
    profiles: ["tracing"]
    depends_on:
      - zovark-signoz-query
    ports:
      - "3301:3301"   # Signoz UI (3301 to avoid conflict with dashboard on 3000)
    environment:
      - FRONTEND_API_ENDPOINT=http://zovark-signoz-query:8080
    networks:
      - zovark-internal
    restart: unless-stopped

# ─── NETWORKS ──────────────────────────────────────────
networks:
  zovark-internal:
    driver: bridge

# ─── VOLUMES ───────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
  prometheus_data:
  grafana_data:
  caddy_data:
  caddy_config:
  es-data:
  healer-logs:
  clickhouse-data:
  signoz-query-data:
  # nginx-logs: replaced with bind mount ./siem-lab/logs
