# =============================================================================
# Optional data-plane overlays: Flink job runtime for training-data pipeline (Ticket 5).
#
#   docker compose -f docker-compose.yml -f docker-compose.data-plane.yml --profile flink up -d
#
# Build the job JAR first: cd platform/flink/training_data_ingest && mvn package
# =============================================================================

services:
  flink-jobmanager:
    image: flink:1.18.1-scala_2.12-java17
    container_name: zovark-flink-jobmanager
    profiles: ["flink"]
    ports:
      - "127.0.0.1:8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
    networks:
      - zovark-internal
    restart: unless-stopped

  flink-taskmanager:
    image: flink:1.18.1-scala_2.12-java17
    container_name: zovark-flink-taskmanager
    profiles: ["flink"]
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
    networks:
      - zovark-internal
    restart: unless-stopped
