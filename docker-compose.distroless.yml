# ============================================================
# Zovark v3.2 Sovereign Appliance — Dev Tier (single inference container)
# Usage: docker compose -f docker-compose.yml -f docker-compose.distroless.yml up -d
#
# Provides llama-server as a single llama.cpp inference container
# running both FAST and CODE models via model aliasing.
# All containers are distroless / read-only where possible.
#
# Current model: Gemma 4 E4B Q4_K_M (5.0GB, --ctx-size 4096)
# Previous model: Nemotron-Mini-4B-Instruct Q4_K_M (2.6GB, kept for rollback)
#
# Prerequisites:
#   - GGUF model files in ./models/ directory
#   - NVIDIA GPU with CUDA support
#   - docker compose v2.20+ (GPU resource reservations)
# ============================================================

services:

  # ─── API (distroless override) ──────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    read_only: true
    tmpfs:
      - /tmp:size=64M,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./web-admin/dist:/app/web-admin/dist:ro

  # ─── INFERENCE (single container, both models) ──────────
  # Dev tier: one llama-server instance serves both models.
  # Parallel slots split across FAST+CODE workloads.
  zovark-inference:
    build:
      context: .
      dockerfile: docker/Dockerfile.inference
      args:
        CUDA_ARCH: ${CUDA_ARCH:-86}
    container_name: zovark-inference
    read_only: true
    tmpfs:
      - /tmp:size=128M,noexec,nosuid
    security_opt:
      - no-new-privileges:true
      - seccomp=config/seccomp-inference.json
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    expose:
      - "8080"
    volumes:
      - ./models:/models:ro
    command:
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - --model
      - /models/${ZOVARK_MODEL_FILE:-gemma-4-e4b-it-Q4_K_M.gguf}
      - --alias
      - ${ZOVARK_MODEL_ALIAS:-gemma-4-e4b-it}
      - --n-gpu-layers
      - "${ZOVARK_GPU_LAYERS:-0}"
      # --ctx-size 4096: Zovark prompts are 200-800 tokens. 4096 gives 2x headroom.
      # Default 128K would allocate ~1.8GB KV cache — unnecessary for short SOC prompts.
      # Increase to 8192 or 16384 if prompt engineering requires longer context.
      - --ctx-size
      - "4096"
      - --parallel
      - "2"
      - -t
      - "${ZOVARK_THREADS:-4}"
      # Gemma 4: --jinja required for chat template processing.
      # --reasoning off disables thinking mode to prevent
      # <|channel>...<channel|> blocks that break GBNF grammar output.
      # See: llama.cpp issues #20345 (grammar+thinking) and #21316 (token corruption)
      - --jinja
      - --reasoning
      - "off"
    environment:
      - LLAMA_PORT=8080
      - LLAMA_MODEL_ALIAS=${ZOVARK_MODEL_ALIAS:-gemma-4-e4b-it}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 10s
      start_period: 300s    # CPU-only load on constrained Docker Desktop VM
      retries: 5
    restart: unless-stopped
    networks:
      - zovark-internal

  # ─── WORKER (override: point LLM at inference container) ─
  worker:
    environment:
      - ZOVARK_LLM_ENDPOINT=http://zovark-inference:8080/v1/chat/completions
      - ZOVARK_LLM_ENDPOINT_FAST=http://zovark-inference:8080/v1/chat/completions
      - ZOVARK_LLM_ENDPOINT_CODE=http://zovark-inference:8080/v1/chat/completions
      - HTTP_PROXY=
      - HTTPS_PROXY=
    depends_on:
      zovark-inference:
        condition: service_healthy

  # ─── DIAGNOSTICS SIDECAR ────────────────────────────────
  # Internal-only diagnostic endpoint. NO host port mapping.
  # Access via API proxy or direct container-to-container calls.
  zovark-diagnostics:
    build:
      context: .
      dockerfile: docker/Dockerfile.diagnostics
    container_name: zovark-diagnostics
    read_only: true
    tmpfs:
      - /tmp:size=16M,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    expose:
      - "8091"
    deploy:
      resources:
        limits:
          memory: 64M
    environment:
      - DIAG_AUTH_TOKEN=${DIAG_AUTH_TOKEN:-}
      - DIAG_PORT=8091
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 15s
      timeout: 5s
      start_period: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - zovark-internal
