# Legacy: nginx front for split query-service + frontend (SigNoz ≤0.64). Zovark v0.76+ uses unified
# signoz/signoz on port 8080 mapped to host 3301 — this file is not mounted by default.
server {
  listen       3301;
  server_name  _;

  gzip on;
  gzip_static on;
  gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_proxied  any;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_buffers 16 8k;
  gzip_http_version 1.1;

  client_max_body_size 24M;
  large_client_header_buffers 8 128k;

  location / {
    root   /usr/share/nginx/html;
    index  index.html index.htm;
    try_files $uri $uri/ /index.html;
  }

  # Proxy ALL /api paths to query service (prefix match, not exact)
  location /api {
    proxy_pass http://signoz-query-service:8080/api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  error_page   500 502 503 504  /50x.html;
  location = /50x.html {
    root   /usr/share/nginx/html;
  }
}
