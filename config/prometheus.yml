# ZOVARC Prometheus Configuration — Sprint 1F
# Start with: docker compose --profile monitoring up -d
#
# Scrapes all ZOVARC services and custom exporters for full observability.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  # ── Go API ──────────────────────────────────────────────
  # The API exposes /api/v1/metrics (JSON, requires auth).
  # This target uses the health endpoint for up/down monitoring.
  # For full metrics, the worker-metrics exporter queries the DB directly.
  - job_name: 'zovarc-api'
    metrics_path: /health
    static_configs:
      - targets: ['api:8090']
        labels:
          service: 'api'
    # Health endpoint returns JSON not Prometheus format;
    # useful for up/down detection via probe-style scraping
    scrape_interval: 30s

  # ── PostgreSQL Exporter ─────────────────────────────────
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'
    scrape_interval: 15s

  # ── Redis Exporter ──────────────────────────────────────
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
    scrape_interval: 15s

  # ── Temporal Queue Exporter ─────────────────────────────
  # Custom Python exporter: pending/active/completed/failed task counts
  - job_name: 'temporal-exporter'
    static_configs:
      - targets: ['temporal-exporter:9092']
        labels:
          service: 'temporal'
    scrape_interval: 15s

  # ── Worker Metrics Exporter ─────────────────────────────
  # Custom Python exporter: investigations, entities, LLM stats, verdicts
  - job_name: 'worker-metrics'
    static_configs:
      - targets: ['worker-metrics:9093']
        labels:
          service: 'worker'
    scrape_interval: 15s
