# Grafana dashboard provisioning — auto-load JSON dashboards on startup.

apiVersion: 1
providers:
  - name: 'HYDRA'
    orgId: 1
    folder: 'HYDRA'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
