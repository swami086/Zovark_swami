# HYDRA Egress Proxy — Domain Allowlist
http_port 3128

# Allowlisted domains for SOAR integrations
acl allowed_domains dstdomain .splunk.com .sentinelone.net .crowdstrike.com
acl allowed_domains dstdomain .paloaltonetworks.com .elastic.co
acl allowed_domains dstdomain .atlassian.net .servicenow.com .zendesk.com
acl allowed_domains dstdomain .slack.com .pagerduty.com .teams.microsoft.com
acl allowed_domains dstdomain .virustotal.com .abuseipdb.com .shodan.io

# CONNECT method for HTTPS
acl SSL_ports port 443
acl CONNECT method CONNECT

# Allow only allowlisted domains
http_access allow CONNECT SSL_ports allowed_domains
http_access allow allowed_domains
http_access deny all

# Logging
access_log stdio:/var/log/squid/access.log combined
cache_log stdio:/var/log/squid/cache.log

# Performance
maximum_object_size 10 MB
cache_dir null /tmp
cache deny all
forwarded_for delete
via off

# Security
request_header_access X-Forwarded-For deny all
reply_header_access X-Squid-Error deny all
httpd_suppress_version_string on

# Timeouts
connect_timeout 30 seconds
read_timeout 60 seconds
request_timeout 60 seconds
