version: '3.8'

services:
  vllm-chat:
    image: vllm/vllm-openai:latest
    container_name: vllm-chat
    # NOTE FOR AIR-GAP: Download 'Mistral-7B-Instruct-v0.2-AWQ' (HuggingFace format), NOT GGUF Q4_K_M.
    # Place the unzipped AWQ HuggingFace model files inside ./local_models/chat-model/
    command: >
      --model /models/chat-model
      --served-model-name fast
      --quantization awq
      --gpu-memory-utilization 0.6
      --max-model-len 4096
      --port 8000
    environment:
      # Prevents vLLM from attempting any internet connection to HuggingFace
      - HF_HUB_OFFLINE=1
      - VLLM_NO_USAGE_STATS=1
    volumes:
      # Mount your local models directory as read-only
      - ./local_models:/models:ro
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  vllm-embed:
    image: vllm/vllm-openai:latest
    container_name: vllm-embed
    # NOTE FOR AIR-GAP: Download 'nomic-embed-text' (Safetensors/HuggingFace format).
    # Place the unzipped model files inside ./local_models/embed-model/
    command: >
      --model /models/embed-model
      --served-model-name embed
      --task embed
      --gpu-memory-utilization 0.1
      --max-model-len 2048
      --port 8001
    environment:
      - HF_HUB_OFFLINE=1
      - VLLM_NO_USAGE_STATS=1
    volumes:
      - ./local_models:/models:ro
    ports:
      - "8001:8001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
