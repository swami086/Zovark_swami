# ZOVARK Model Routing Configuration
# American models only: Meta Llama (NVIDIA Nemotron fallback when available)
# Zero Chinese model dependencies
version: "2026-03"

models:
  fast:
    name: "zovark-fast"
    endpoint: "http://host.docker.internal:11434/v1/chat/completions"
    model: "llama3.2:3b"
    max_tokens: 1024
    temperature: 0.1
    timeout_seconds: 60
    description: "Fast tier — Meta Llama 3.2 3B for param fill (Path B)"

  standard:
    name: "zovark-standard"
    endpoint: "http://host.docker.internal:11434/v1/chat/completions"
    model: "llama3.1:8b"
    max_tokens: 4096
    temperature: 0.1
    timeout_seconds: 300
    description: "Standard tier — Meta Llama 3.1 8B for code gen + assess"

  enterprise:
    name: "zovark-enterprise"
    endpoint: "http://localhost:8080/v1/chat/completions"
    model: "zovark-enterprise"
    max_tokens: 16384
    temperature: 0.1
    timeout_seconds: 600
    description: "Enterprise tier — large model for complex analysis (requires A100)"

routing:
  default: "standard"

  severity_overrides:
    low: "fast"
    medium: "standard"
    high: "standard"
    critical: "standard"
