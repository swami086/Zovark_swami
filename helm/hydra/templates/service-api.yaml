apiVersion: v1
kind: Service
metadata:
  name: {{ include "hydra.fullname" . }}-api
  labels:
    {{- include "hydra.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: 8090
      protocol: TCP
      name: http
  selector:
    {{- include "hydra.api.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hydra.fullname" . }}-dashboard
  labels:
    {{- include "hydra.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - port: {{ .Values.dashboard.service.port }}
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "hydra.dashboard.selectorLabels" . | nindent 4 }}
