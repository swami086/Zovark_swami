apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zovark.fullname" . }}-api
  labels:
    {{- include "zovark.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "zovark.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "zovark.api.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8090
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.api.env.PORT | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "zovark.fullname" . }}-secrets
                  key: database-url
            - name: TEMPORAL_ADDRESS
              value: {{ .Values.api.env.TEMPORAL_ADDRESS | quote }}
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "zovark.fullname" . }}-secrets
                  key: litellm-master-key
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "zovark.fullname" . }}-secrets
                  key: jwt-secret
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
