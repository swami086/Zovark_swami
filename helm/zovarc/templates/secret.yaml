apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zovarc.fullname" . }}-secrets
  labels:
    {{- include "zovarc.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ .Values.secrets.databaseUrl | quote }}
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}
  litellm-master-key: {{ .Values.secrets.litellmMasterKey | quote }}
  {{- if .Values.integrations.slack.webhookUrl }}
  slack-webhook-url: {{ .Values.integrations.slack.webhookUrl | quote }}
  {{- end }}
  {{- if .Values.integrations.teams.webhookUrl }}
  teams-webhook-url: {{ .Values.integrations.teams.webhookUrl | quote }}
  {{- end }}
  {{- if .Values.integrations.jira.apiToken }}
  jira-api-token: {{ .Values.integrations.jira.apiToken | quote }}
  {{- end }}
  {{- if .Values.integrations.email.smtpPassword }}
  smtp-password: {{ .Values.integrations.email.smtpPassword | quote }}
  {{- end }}
  {{- if .Values.integrations.servicenow.password }}
  snow-password: {{ .Values.integrations.servicenow.password | quote }}
  {{- end }}
