version: "3.8"

# Override file for autoscaler service
# Usage: docker compose -f docker-compose.yml -f docker-compose.autoscaler.yml up autoscaler

services:
  autoscaler:
    build:
      context: ./worker
    command: python scripts/autoscale.py
    environment:
      - AUTOSCALE_MIN=1
      - AUTOSCALE_MAX=10
      - AUTOSCALE_THRESHOLD=5
      - TEMPORAL_ADDRESS=temporal:7233
      - POLL_INTERVAL=15
      - COMPOSE_PROJECT_DIR=/app
    volumes:
      - ./scripts:/app/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - temporal
    networks:
      - zovark-internal
    restart: unless-stopped
    profiles:
      - autoscaler

networks:
  zovark-internal:
    external: true
    name: hydra-mvp_zovark-internal
